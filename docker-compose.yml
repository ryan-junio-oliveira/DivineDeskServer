version: '3.8'

services:
    mysql:
        image: mysql:8.0
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: laravel
            MYSQL_USER: laravel
            MYSQL_PASSWORD: secret
        volumes:
            - mysql_data:/var/lib/mysql
        ports:
            - '3306:3306'
        networks:
            - app-network

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        environment:
            PMA_HOST: mysql
            MYSQL_ROOT_PASSWORD: root
        ports:
            - '8080:80'
        depends_on:
            - mysql
        networks:
            - app-network

    memcached:
        image: 'memcached:alpine'
        networks:
            - app-network

    redis:
        image: 'redis:alpine'
        networks:
            - app-network

    webserver:
        image: 'nginx:alpine'
        working_dir: /var/www/html
        volumes:
            - './src:/var/www/html'
            - './phpdocker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf'
        ports:
            - '9000:80'
        depends_on:
            - php-fpm
        networks:
            - app-network

    php-fpm:
        build:
            context: ./phpdocker/php-fpm
            dockerfile: Dockerfile
        working_dir: /var/www/html
        volumes:
            - './src:/var/www/html'
            - './phpdocker/php-fpm/php-ini-overrides.ini:/etc/php/8.3/fpm/conf.d/99-overrides.ini'
        depends_on:
            - mysql
        networks:
            - app-network

volumes:
    mysql_data:
        driver: local

networks:
    app-network:
        driver: bridge
